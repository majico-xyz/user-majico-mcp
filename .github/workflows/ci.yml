name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: majico-xyz/majico-sdk
          path: majico-sdk
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Build @majico/sdk from source (npm 1.0.1 tarball lacks dist/)
        run: |
          cd majico-sdk
          bun install --frozen-lockfile
          bun run build
          npm pack
          mv majico-sdk-*.tgz ../majico-sdk.tgz
      - run: bun install --frozen-lockfile
      - run: bun add ./majico-sdk.tgz
      - run: bun run typecheck
      - run: bun run test